<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mouse Share Web</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 2rem;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    .card {
      background: #1e293b;
      border-radius: 1rem;
      padding: 2rem;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(to right, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: #94a3b8;
      margin-bottom: 2rem;
    }
    .btn-group {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    button {
      flex: 1;
      padding: 1rem;
      font-size: 1.1rem;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-host {
      background: #3b82f6;
      color: white;
    }
    .btn-host:hover {
      background: #2563eb;
    }
    .btn-client {
      background: #8b5cf6;
      color: white;
    }
    .btn-client:hover {
      background: #7c3aed;
    }
    .hidden {
      display: none;
    }
    input {
      width: 100%;
      padding: 1rem;
      font-size: 1.2rem;
      background: #0f172a;
      border: 2px solid #334155;
      border-radius: 0.5rem;
      color: white;
      text-align: center;
      letter-spacing: 0.3rem;
      margin-bottom: 1rem;
    }
    .otp-display {
      font-size: 2.5rem;
      font-weight: bold;
      text-align: center;
      letter-spacing: 0.5rem;
      color: #3b82f6;
      margin: 2rem 0;
    }
    .status {
      padding: 1rem;
      border-radius: 0.5rem;
      text-align: center;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .status-success {
      background: #065f46;
      color: #d1fae5;
    }
    .status-waiting {
      background: #78350f;
      color: #fef3c7;
    }
    .status-error {
      background: #7f1d1d;
      color: #fecaca;
    }
    .log {
      background: #0f172a;
      border-radius: 0.5rem;
      padding: 1rem;
      max-height: 300px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
    }
    .log-entry {
      padding: 0.25rem 0;
      border-bottom: 1px solid #1e293b;
    }
    .log-time {
      color: #64748b;
      margin-right: 0.5rem;
    }
    .position-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-top: 1rem;
    }
    .position-btn {
      padding: 1.5rem;
      background: #334155;
      border: 2px solid #475569;
      border-radius: 0.5rem;
      color: white;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s;
    }
    .position-btn:hover {
      background: #475569;
      border-color: #3b82f6;
    }
    #canvas-container {
      position: relative;
      width: 100%;
      height: 400px;
      background: #0f172a;
      border-radius: 0.5rem;
      border: 2px solid #334155;
      overflow: hidden;
      cursor: none;
    }
    #cursor {
      position: absolute;
      width: 20px;
      height: 20px;
      background: #3b82f6;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: all 0.05s;
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>🖱️ Mouse Share Web</h1>
      <p class="subtitle">Control multiple computers with one mouse</p>
      
      <!-- Mode Selection -->
      <div id="mode-select" class="btn-group">
        <button class="btn-host" onclick="startHost()">Host (Share Mouse)</button>
        <button class="btn-client" onclick="startClient()">Client (Receive Control)</button>
      </div>

      <!-- Host Mode -->
      <div id="host-mode" class="hidden">
        <div class="status status-success">
          ✓ Host Mode Active
        </div>
        <div class="otp-display" id="otp-code">------</div>
        <p style="text-align: center; color: #94a3b8; margin-bottom: 2rem;">
          Share this code with your other laptop
        </p>
        
        <div id="client-position" class="hidden">
          <h3 style="margin-bottom: 1rem;">Where is the client laptop?</h3>
          <div class="position-grid">
            <button class="position-btn" onclick="setPosition('left')">⬅️ Left</button>
            <button class="position-btn" onclick="setPosition('right')">➡️ Right</button>
            <button class="position-btn" onclick="setPosition('top')">⬆️ Top</button>
            <button class="position-btn" onclick="setPosition('bottom')">⬇️ Bottom</button>
          </div>
        </div>
      </div>

      <!-- Client Mode -->
      <div id="client-mode" class="hidden">
        <div class="status status-waiting">
          ⏳ Client Mode
        </div>
        <input type="text" id="otp-input" placeholder="Enter OTP Code" maxlength="6" style="text-transform: uppercase;">
        <button class="btn-client" style="width: 100%;" onclick="connectToHost()">Connect</button>
        
        <div id="client-canvas" class="hidden" style="margin-top: 2rem;">
          <h3 style="margin-bottom: 1rem;">Remote Mouse Control</h3>
          <div id="canvas-container">
            <div id="cursor"></div>
          </div>
          <p style="text-align: center; color: #94a3b8; margin-top: 1rem;">
            Mouse movements from host will appear here
          </p>
        </div>
      </div>
    </div>

    <!-- Logs -->
    <div class="card">
      <h3 style="margin-bottom: 1rem;">Activity Log</h3>
      <div class="log" id="log"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const SERVER_URL = 'http://192.168.1.3:3002';
    let socket = null;
    let mode = null;
    let otp = null;
    let clientId = null;

    function log(message) {
      const logEl = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `<span class="log-time">[${time}]</span>${message}`;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function startHost() {
      mode = 'host';
      document.getElementById('mode-select').classList.add('hidden');
      document.getElementById('host-mode').classList.remove('hidden');
      
      socket = io(SERVER_URL);
      
      socket.on('connect', () => {
        log('✓ Connected to server');
        socket.emit('create-session', (response) => {
          otp = response.otp;
          document.getElementById('otp-code').textContent = otp;
          log(`Session created: ${otp}`);
        });
      });

      socket.on('client-joined', (data) => {
        clientId = data.clientId;
        log(`Client connected: ${clientId}`);
        document.getElementById('client-position').classList.remove('hidden');
      });

      socket.on('disconnect', () => {
        log('✗ Disconnected from server');
      });
    }

    function setPosition(position) {
      socket.emit('set-client-position', { clientId, position });
      log(`Client positioned: ${position}`);
      document.getElementById('client-position').classList.add('hidden');
      alert(`Client positioned ${position}. Now move your physical mouse to the ${position} edge to switch!`);
    }

    function startClient() {
      mode = 'client';
      document.getElementById('mode-select').classList.add('hidden');
      document.getElementById('client-mode').classList.remove('hidden');
      log('Client mode selected');
    }

    function connectToHost() {
      const otpInput = document.getElementById('otp-input').value.toUpperCase().trim();
      if (!otpInput || otpInput.length !== 6) {
        alert('Please enter a valid 6-character OTP');
        return;
      }

      otp = otpInput;
      socket = io(SERVER_URL);

      socket.on('connect', () => {
        log('✓ Connected to server');
        socket.emit('join-session', { otp }, (response) => {
          if (response.success) {
            log('✓ Joined session successfully');
            document.getElementById('client-canvas').classList.remove('hidden');
          } else {
            log('✗ Invalid OTP');
            alert('Invalid OTP code');
          }
        });
      });

      socket.on('position-set', (data) => {
        log(`Position assigned: ${data.position}`);
      });

      socket.on('take-control', (data) => {
        log('✓ Mouse control activated');
        const cursor = document.getElementById('cursor');
        const container = document.getElementById('canvas-container');
        const rect = container.getBoundingClientRect();
        
        cursor.style.left = (data.x * rect.width) + 'px';
        cursor.style.top = (data.y * rect.height) + 'px';
        cursor.style.display = 'block';
      });

      socket.on('disconnect', () => {
        log('✗ Disconnected from server');
      });
    }

    // Track mouse position on canvas for client
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('canvas-container');
      const cursor = document.getElementById('cursor');
      
      container.addEventListener('mousemove', (e) => {
        if (mode === 'client' && socket) {
          const rect = container.getBoundingClientRect();
          const x = (e.clientX - rect.left) / rect.width;
          const y = (e.clientY - rect.top) / rect.height;
          
          cursor.style.left = (e.clientX - rect.left) + 'px';
          cursor.style.top = (e.clientY - rect.top) + 'px';
        }
      });
    });
  </script>
</body>
</html>
